name: Semantic PR
permissions:
  pull-requests: read

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  main:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Configure which scopes are allowed (newline-delimited).
          scopes: |
            cbor
            cmd
            committee
            config
            consensus
            crypto
            daemon
            deps
            docker
            docs
            encoding
            execution
            firewall
            genesis
            github
            grpc
            gtk
            html
            http
            jsonrpc
            linter
            linux
            macos
            main
            makefile
            network
            node
            other
            packager
            proto
            release
            releaser
            repo
            sandbox
            scripts
            shell
            sortition
            state
            store
            sync
            txpool
            types
            util
            version
            wallet
            wallet-cmd
            windows
            www
            zeromq
          # Configure that a scope must always be provided.
          requireScope: true
          # The subject should not start with an uppercase character and should not end with a period.
          subjectPattern: ^(?![A-Z]).+[^.]$
          subjectPatternError: |
            The subject "{subject}" cannot start with an uppercase character or end with a period.
